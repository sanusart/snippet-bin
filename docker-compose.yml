services:
  server:
    container_name: server
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./server/data:/app/data
    environment:
      - NODE_ENV=production
      - JWT_SECRET=snippet-bin-secret-key-change-in-production
      - PORT=3001
    restart: unless-stopped

  client:
    container_name: client
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://localhost:3001/api
    restart: unless-stopped

networks:
  default:
    name: snippet-bin-network
